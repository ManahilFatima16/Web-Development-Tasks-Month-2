<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎵 My Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎧 My Music Player</h1>
            <p>Play, search, and enjoy your favorite tunes!</p>
        </header>

        <!-- Search & Category -->
        <div class="controls-top">
            <input type="text" id="searchBox" placeholder="Search song..." class="search-input">
            
            <select id="categoryFilter" class="category-select">
                <option value="all">All Genres</option>
                <option value="pop">Pop</option>
                <option value="rock">Rock</option>
                <option value="classic">Classic</option>
            </select>
        </div>

        <!-- Playlist -->
        <ul id="playlist" class="playlist"></ul>

        <!-- Audio Controls -->
        <div class="player-controls">
            <button onclick="prevSong()">⏮</button>
            <button onclick="playPause()">▶ / ⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <!-- Volume -->
        <div class="volume-control">
            <label>Volume:</label>
            <input type="range" min="0" max="1" step="0.1" id="volumeControl">
        </div>
    </div>

    <!-- Audio element -->
    <audio id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
